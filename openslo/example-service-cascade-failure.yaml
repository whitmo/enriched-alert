apiVersion: openslo/v1
kind: SLO
metadata:
  name: example-service-cascade-failure
  displayName: Example Service Cascade Failure SLO
spec:
  service: example-service
  description: Cascade failure rate must be below 5% over a 5-minute window
  budgetingMethod: Occurrences
  objectives:
    - displayName: Cascade failure rate < 5%
      target: 0.95
      ratioMetrics:
        good:
          metricSource:
            type: Prometheus
            spec:
              query: >-
                sum(rate(http_requests_total{endpoint="/cascade-failure",status_code!~"5.."}[5m]))
        total:
          metricSource:
            type: Prometheus
            spec:
              query: >-
                sum(rate(http_requests_total{endpoint="/cascade-failure"}[5m]))
  timeWindow:
    - duration: 5m
      isRolling: true
  alertPolicies:
    - kind: AlertPolicy
      metadata:
        name: example-service-cascade-failure-breach
        labels:
          slo_name: example-service-cascade-failure
      spec:
        description: Cascade failure SLO breach for example-service
        alertWhenBreaching: true
        conditions:
          - kind: AlertCondition
            spec:
              condition:
                kind: burnrate
                threshold: 1
                lookbackWindow: 5m
              alertAfter: 1m
        notificationTargets:
          - targetRef: alertmanager-webhook

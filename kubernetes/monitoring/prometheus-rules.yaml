apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: slo-rules
  labels:
    release: prometheus
spec:
  groups:
    - name: slo.recording
      rules:
        - record: slo:example_service_latency:ratio_rate5m
          expr: |
            sum(rate(http_request_duration_seconds_bucket{le="0.5"}[5m]))
            /
            sum(rate(http_request_duration_seconds_count[5m]))
        - record: slo:example_service_error_rate:ratio_rate5m
          expr: |
            sum(rate(http_requests_total{status_code!~"5.."}[5m]))
            /
            sum(rate(http_requests_total[5m]))
        - record: slo:example_service_cascade_failure:ratio_rate5m
          expr: |
            sum(rate(http_requests_total{endpoint="/cascade-failure",status_code!~"5.."}[5m]))
            /
            sum(rate(http_requests_total{endpoint="/cascade-failure"}[5m]))
        - record: slo:example_service_memory_pressure:bytes
          expr: |
            memory_pressure_bytes
    - name: slo.alerting
      rules:
        - alert: SLOLatencyBreach
          expr: slo:example_service_latency:ratio_rate5m < 0.99
          for: 2m
          labels:
            severity: warning
            alerttype: slo
            slo_name: example-service-latency
          annotations:
            summary: "Latency SLO breach detected for example-service"
            description: "Less than 99% of requests completed under 500ms for more than 2 minutes."
        - alert: SLOErrorRateBreach
          expr: slo:example_service_error_rate:ratio_rate5m < 0.99
          for: 2m
          labels:
            severity: warning
            alerttype: slo
            slo_name: example-service-error-rate
          annotations:
            summary: "Error rate SLO breach detected for example-service"
            description: "Less than 99% of requests succeeded (non-5xx) for more than 2 minutes."
        - alert: SLOCascadeFailureBreach
          expr: slo:example_service_cascade_failure:ratio_rate5m < 0.95
          for: 2m
          labels:
            severity: warning
            alerttype: slo
            slo_name: example-service-cascade-failure
          annotations:
            summary: "Cascade failure SLO breach detected for example-service"
            description: "More than 5% of cascade requests failed for more than 2 minutes."
        - alert: SLOResourceExhaustionBreach
          expr: memory_pressure_bytes > 268435456
          for: 2m
          labels:
            severity: warning
            alerttype: slo
            slo_name: example-service-resource-exhaustion
          annotations:
            summary: "Resource exhaustion SLO breach detected for example-service"
            description: "Memory pressure exceeded 256MB for more than 2 minutes."

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: slo-rules
  labels:
    release: prometheus
spec:
  groups:
    - name: slo.recording
      rules:
        - record: slo:example_service_latency:ratio_rate5m
          expr: |
            1 - (
              rate(http_request_duration_seconds_bucket{le="0.5"}[5m])
              /
              rate(http_request_duration_seconds_count[5m])
            )
        - record: slo:example_service_error_rate:ratio_rate5m
          expr: |
            rate(http_requests_total{status=~"5.."}[5m])
            /
            rate(http_requests_total[5m])
    - name: slo.alerting
      rules:
        - alert: SLOBreach
          expr: slo:example_service_error_rate:ratio_rate5m > 0.01 or slo:example_service_latency:ratio_rate5m > 0.05
          for: 2m
          labels:
            severity: warning
            alerttype: slo
            slo_name: example-service
          annotations:
            summary: "SLO breach detected for example-service"
            description: "Error rate or latency SLO has been violated for more than 2 minutes."

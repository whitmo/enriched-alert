apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-agent
  labels:
    app: ai-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-agent
  template:
    metadata:
      labels:
        app: ai-agent
    spec:
      containers:
        - name: ai-agent
          image: ai-agent:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: OPENSLO_DIR
              value: /openslo
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              memory: "128Mi"
              cpu: "250m"
          volumeMounts:
            - name: openslo-definitions
              mountPath: /openslo
              readOnly: true
      volumes:
        - name: openslo-definitions
          configMap:
            name: openslo-definitions
